name: foodnpalsapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.1.3+25

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.4.2
  shared_preferences: ^2.2.2
  http: ^1.2.1
  geolocator: ^14.0.2
  permission_handler: ^11.3.0
  url_launcher: ^6.2.6
  cupertino_icons: ^1.0.8
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.1
  firebase_messaging: ^16.0.0
  google_sign_in: ^6.2.1
  mobile_scanner: 3.5.7
  webview_flutter_android: ^3.12.1
  webview_flutter_wkwebview: ^3.9.4
  google_maps_flutter: ^2.5.0
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  change_app_package_name: ^1.1.0

flutter:
  uses-material-design: true
  assets:
    - android_asset/offline.html
    - assets/images/
    - assets/sounds/booking_ring.mp3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/appicon.jpg"
  adaptive_icon_background: "#4CBB17"
  adaptive_icon_foreground: "assets/images/appicon.jpg"
  remove_alpha_ios: true