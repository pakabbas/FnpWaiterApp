# FnP Waiter — Android release (signed APK + Play AAB).
#
# Goals (do not regress):
#   1) Play Store versionCode: always unique per workflow run / re-run (no "already used").
#   2) 16 KB page size: NDK r28, ANDROID_NDK_HOME, Gradle manifest/packaging, arm64-v8a-only
#      abiFilters in android/app/build.gradle.kts (see build_instructions.txt NEVER REGRESS).
#
# Secrets: RELEASE_KEYSTORE, STORE_PASSWORD, KEY_PASSWORD, KEY_ALIAS
# Variable (optional): PLAY_STORE_VERSION_OFFSET — base for versionCode (default 1000000).
#   versionCode = OFFSET + (GITHUB_RUN_NUMBER * 1000) + GITHUB_RUN_ATTEMPT
#
# APK and AAB use the same --build-name / --build-number so local tests match Play metadata.

name: FnP Android Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: fnp-android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apk:
    name: Signed release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      # Do not run flutter pub upgrade here — it can change resolved versions vs pubspec.lock and fail CI.
      # For Play / 16 KB issues, upgrade deps locally, commit pubspec.lock, then push.

      - name: Install Android NDK r28 (16 KB page size)
        shell: bash
        run: |
          set -euo pipefail
          ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/Android/Sdk}}"
          export ANDROID_SDK_ROOT="$ROOT"
          export ANDROID_HOME="$ROOT"
          FOUND=""
          for C in "$ROOT/cmdline-tools"/*/bin/sdkmanager; do
            if [ -x "$C" ]; then FOUND="$C"; break; fi
          done
          if [ -z "$FOUND" ] && [ -x "$ROOT/tools/bin/sdkmanager" ]; then FOUND="$ROOT/tools/bin/sdkmanager"; fi
          if [ -n "$FOUND" ]; then
            # Licenses must be accepted or sdkmanager exits non-zero and fails the job under set -e.
            set +o pipefail
            yes | "$FOUND" --sdk_root="$ROOT" --licenses >/dev/null 2>&1 || true
            yes | "$FOUND" --sdk_root="$ROOT" "ndk;28.2.13676358" >/dev/null
            set -o pipefail
            echo "Installed NDK 28.2.13676358 via $FOUND"
          else
            echo "::warning::sdkmanager not found under $ROOT — Gradle may download NDK via AGP. See build_instructions.txt if Play reports 16 KB errors."
          fi

      - name: Point Gradle at NDK r28 (Play 16 KB)
        shell: bash
        run: |
          set -euo pipefail
          ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/Android/Sdk}}"
          NDK="$ROOT/ndk/28.2.13676358"
          if [ -d "$NDK" ]; then
            echo "ANDROID_NDK_HOME=$NDK" >> "$GITHUB_ENV"
            echo "NDK_ROOT=$NDK" >> "$GITHUB_ENV"
            echo "Using NDK at $NDK"
          else
            echo "::warning::NDK not found at $NDK — Gradle may download a matching NDK; verify AAB with APK Analyzer if Play reports 16 KB errors."
          fi

      - name: Version name from pubspec
        id: pubspec
        run: |
          LINE=$(grep '^version:' pubspec.yaml | head -1 | sed 's/version: *//' | tr -d ' ')
          NAME=$(echo "$LINE" | cut -d'+' -f1)
          echo "version_name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Play-safe versionCode (unique per run and re-run)
        id: ver
        env:
          OFFSET_RAW: ${{ vars.PLAY_STORE_VERSION_OFFSET }}
        run: |
          set -euo pipefail
          OFF="${OFFSET_RAW:-1000000}"
          [ -z "$OFF" ] && OFF=1000000
          CODE=$((OFF + GITHUB_RUN_NUMBER * 1000 + GITHUB_RUN_ATTEMPT))
          echo "version_code=$CODE" >> "$GITHUB_OUTPUT"
          {
            echo "## Release version"
            echo "- **versionName** (pubspec / --build-name): ${{ steps.pubspec.outputs.version_name }}"
            echo "- **versionCode** (--build-number): \`$CODE\`"
            echo "- Formula: \`OFFSET ($OFF) + run#$GITHUB_RUN_NUMBER×1000 + attempt=$GITHUB_RUN_ATTEMPT\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
        run: echo "$RELEASE_KEYSTORE" | base64 -d > android/app/ci-release.keystore

      - name: Write key.properties (CI)
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cat > android/key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=ci-release.keystore
          EOF

      - name: Build APK (same version as AAB job)
        run: |
          flutter clean
          flutter build apk --release \
            --build-name="${{ steps.pubspec.outputs.version_name }}" \
            --build-number="${{ steps.ver.outputs.version_code }}"

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk-v${{ steps.ver.outputs.version_code }}
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  aab:
    name: Play Store AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      # Do not run flutter pub upgrade here — it can change resolved versions vs pubspec.lock and fail CI.
      # For Play / 16 KB issues, upgrade deps locally, commit pubspec.lock, then push.

      - name: Install Android NDK r28 (16 KB page size)
        shell: bash
        run: |
          set -euo pipefail
          ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/Android/Sdk}}"
          export ANDROID_SDK_ROOT="$ROOT"
          export ANDROID_HOME="$ROOT"
          FOUND=""
          for C in "$ROOT/cmdline-tools"/*/bin/sdkmanager; do
            if [ -x "$C" ]; then FOUND="$C"; break; fi
          done
          if [ -z "$FOUND" ] && [ -x "$ROOT/tools/bin/sdkmanager" ]; then FOUND="$ROOT/tools/bin/sdkmanager"; fi
          if [ -n "$FOUND" ]; then
            set +o pipefail
            yes | "$FOUND" --sdk_root="$ROOT" --licenses >/dev/null 2>&1 || true
            yes | "$FOUND" --sdk_root="$ROOT" "ndk;28.2.13676358" >/dev/null
            set -o pipefail
            echo "Installed NDK 28.2.13676358 via $FOUND"
          else
            echo "::warning::sdkmanager not found under $ROOT — Gradle may download NDK via AGP. See build_instructions.txt if Play reports 16 KB errors."
          fi

      - name: Point Gradle at NDK r28 (Play 16 KB)
        shell: bash
        run: |
          set -euo pipefail
          ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/Android/Sdk}}"
          NDK="$ROOT/ndk/28.2.13676358"
          if [ -d "$NDK" ]; then
            echo "ANDROID_NDK_HOME=$NDK" >> "$GITHUB_ENV"
            echo "NDK_ROOT=$NDK" >> "$GITHUB_ENV"
            echo "Using NDK at $NDK"
          else
            echo "::warning::NDK not found at $NDK — Gradle may download a matching NDK; verify AAB with APK Analyzer if Play reports 16 KB errors."
          fi

      - name: Version name from pubspec
        id: pubspec
        run: |
          LINE=$(grep '^version:' pubspec.yaml | head -1 | sed 's/version: *//' | tr -d ' ')
          NAME=$(echo "$LINE" | cut -d'+' -f1)
          echo "version_name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Play-safe versionCode (unique per run and re-run)
        id: ver
        env:
          OFFSET_RAW: ${{ vars.PLAY_STORE_VERSION_OFFSET }}
        run: |
          set -euo pipefail
          OFF="${OFFSET_RAW:-1000000}"
          [ -z "$OFF" ] && OFF=1000000
          CODE=$((OFF + GITHUB_RUN_NUMBER * 1000 + GITHUB_RUN_ATTEMPT))
          echo "version_code=$CODE" >> "$GITHUB_OUTPUT"
          {
            echo "## Play bundle version"
            echo "- **versionName** (pubspec / --build-name): ${{ steps.pubspec.outputs.version_name }}"
            echo "- **versionCode** (--build-number): \`$CODE\`"
            echo "- Formula: \`OFFSET ($OFF) + run#$GITHUB_RUN_NUMBER×1000 + attempt=$GITHUB_RUN_ATTEMPT\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
        run: echo "$RELEASE_KEYSTORE" | base64 -d > android/app/ci-release.keystore

      - name: Write key.properties (CI)
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cat > android/key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=ci-release.keystore
          EOF

      - name: Build app bundle
        run: |
          flutter clean
          flutter build appbundle --release \
            --build-name="${{ steps.pubspec.outputs.version_name }}" \
            --build-number="${{ steps.ver.outputs.version_code }}"

      - uses: actions/upload-artifact@v4
        with:
          name: release-aab-v${{ steps.ver.outputs.version_code }}
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
