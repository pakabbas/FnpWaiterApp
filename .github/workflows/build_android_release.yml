# One workflow run per push: builds signed APK and Play AAB in parallel (two jobs).
#
# Secrets: RELEASE_KEYSTORE, STORE_PASSWORD, KEY_PASSWORD, KEY_ALIAS
# Variable (optional): PLAY_STORE_VERSION_OFFSET — base for versionCode (default 1000000).
# versionCode = OFFSET + (GITHUB_RUN_NUMBER * 1000) + GITHUB_RUN_ATTEMPT
# (run_attempt increments on "Re-run jobs", so re-runs never reuse the same code as the first try.)

name: Android Release (APK + Play Bundle)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  apk:
    name: Release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
        run: echo "$RELEASE_KEYSTORE" | base64 -d > android/app/ci-release.keystore

      - name: Write key.properties (CI)
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cat > android/key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=ci-release.keystore
          EOF

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  aab:
    name: Play Store AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Version name from pubspec
        id: pubspec
        run: |
          LINE=$(grep '^version:' pubspec.yaml | head -1 | sed 's/version: *//' | tr -d ' ')
          NAME=$(echo "$LINE" | cut -d'+' -f1)
          echo "version_name=$NAME" >> $GITHUB_OUTPUT

      - name: Play versionCode
        id: ver
        env:
          OFFSET_RAW: ${{ vars.PLAY_STORE_VERSION_OFFSET }}
        run: |
          OFF="${OFFSET_RAW:-1000000}"
          [ -z "$OFF" ] && OFF=1000000
          CODE=$((OFF + GITHUB_RUN_NUMBER * 1000 + GITHUB_RUN_ATTEMPT))
          echo "version_code=$CODE" >> $GITHUB_OUTPUT
          echo "AAB versionCode=$CODE (OFFSET=$OFF + run#$GITHUB_RUN_NUMBER*1000 + attempt=$GITHUB_RUN_ATTEMPT)"

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
        run: echo "$RELEASE_KEYSTORE" | base64 -d > android/app/ci-release.keystore

      - name: Write key.properties (CI)
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cat > android/key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=ci-release.keystore
          EOF

      - name: Build app bundle
        run: |
          flutter build appbundle --release \
            --build-name="${{ steps.pubspec.outputs.version_name }}" \
            --build-number="${{ steps.ver.outputs.version_code }}"

      - uses: actions/upload-artifact@v4
        with:
          name: release-aab-v${{ steps.ver.outputs.version_code }}
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
